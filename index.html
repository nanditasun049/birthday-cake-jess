<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jessica's Birthday 🎂</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 4cqi;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 10px;
        color: #704e4e;
      }

      #subTitle {
        font-size: 20px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #704e4e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="birthdayText"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Jess 💕";
      let candleCount = parseInt(params.get("candles")) || 22;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}</div>
        <div id="subTitle">tap the candles to blow them out hehe 😏🔊</div>
      `;

      const cake = document.getElementById("cake");

      const colors = [
        "red-candle"
      ];
      const CAKE_VISUAL_WIDTH = 60;
// Load your Taylor Swift track
      const birthdaySong = new Audio("Taylor_Swift_22.mp3"); // Ensure this matches your exact file extension!

      // CONFIGURATION: Set the start point and how long it should play
      const startTime = 105;   // Skips straight to "I don't know about you..."
      const playDuration = 38.4; // (long enough to finish the "feeling 22" line)

      // Automatically stops the song after your playDuration finishes
      birthdaySong.addEventListener("play", () => {
        setTimeout(() => {
          birthdaySong.pause();
          birthdaySong.currentTime = startTime; // Resets it back to the beginning of the clip
        }, playDuration * 1000); 
      });
      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 50;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 11;
        const rowCount = Math.ceil(count / candlesPerRow);
        const shiftAmount = 5;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${35 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 40}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

 // === Tap to Blow Out ===
      let blown = false;

      function blowOutCandles() {
        if (blown) return; 
        blown = true;

        // Skip directly to the chorus before playing
        birthdaySong.currentTime = startTime; 
        
        birthdaySong.play().catch((error) => {
          console.log("Audio playback blocked or failed:", error);
        });

        const candles = document.querySelectorAll(".candle");
        // ... your existing candle blowout loop stays exactly the same ...
        candles.forEach((candle) => {
          // Subtle random staggered delay for realism
          const delay = Math.random() * 600; 
          
          setTimeout(() => {
            colors.forEach((color) => {
              if (candle.classList.contains(color)) {
                // Instantly changes the animation rule from infinite to 2 loops total
                candle.classList.add("blowing-out");
              }
            });
          }, delay);
        });

        // Update subtitle text after the final 3 loops have finished playing (~3 seconds)
        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.textContent = `YAYYYYY big twenty two 🎉 Love, Nanz`;
        }, 1200);
        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.textContent = `Reload the page to make another wish! ☀️`;
        }, 10000);
      }

      // Detect clicks or taps anywhere on the screen container
      document.querySelector(".container").addEventListener("click", blowOutCandles);
    </script>
  </body>
</html>
